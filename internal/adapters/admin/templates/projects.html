{{define "admin-projects-page"}}
{{template "header" .}}
<header class="topbar">
  <span class="brand">Traccia Admin</span>
  <div class="topbar-actions">
    <a href="/admin/projects/new" class="button">+ Nuevo proyecto</a>
    <form method="post" action="/admin/logout"><button class="link-button" type="submit">Cerrar sesión</button></form>
  </div>
</header>
<main>
  <table>
    <thead>
      <tr><th>Nombre</th><th>Dominio</th><th>Project ID</th><th>Creado</th><th></th></tr>
    </thead>
    <tbody>
      {{range .Projects}}
      <tr>
        <td>{{.Name}}</td>
        <td class="muted">{{.Domain}}</td>
        <td class="mono">{{.ID}}</td>
        <td class="muted">{{.CreatedAt}}</td>
        <td>
          <form method="post" action="/admin/projects/{{.ID}}/view">
            <button type="submit" class="link-button">Ver dashboard →</button>
          </form>
        </td>
      </tr>
      {{else}}
      <tr><td colspan="5" class="muted">Todavía no hay proyectos. Creá el primero con "+ Nuevo proyecto".</td></tr>
      {{end}}
    </tbody>
  </table>
</main>
{{template "footer" .}}
{{end}}
