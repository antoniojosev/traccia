{{define "login-page"}}
{{template "header" .}}
<div class="login-box">
  <h1>Traccia</h1>
  <p>Ingresá la API key de tu proyecto para ver sus estadísticas.</p>
  {{if .Error}}<p class="error" role="alert">{{.Error}}</p>{{end}}
  <form method="post" action="/dashboard/login">
    <label for="api_key">API key
      <input id="api_key" type="password" name="api_key" autocomplete="off" spellcheck="false" required autofocus>
    </label>
    <button type="submit">Entrar</button>
  </form>
  <p class="muted">¿Sos administrador? <a href="/admin">Entrá por el panel de admin</a>.</p>
</div>
{{template "footer" .}}
{{end}}
