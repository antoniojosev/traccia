services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: traccia
      POSTGRES_PASSWORD: traccia
      POSTGRES_DB: traccia
    volumes:
      - traccia_pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traccia"]
      interval: 2s
      timeout: 3s
      retries: 15

  traccia:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        # Not just "container started" — pg_isready only succeeds once
        # Postgres finishes running migrations/*.sql via
        # docker-entrypoint-initdb.d and is actually accepting queries.
        # Without this, the app can boot and serve /healthz (which has no
        # DB dependency) before Postgres is really ready, and the first
        # real query racing that window fails.
        condition: service_healthy
    environment:
      PORT: 8080
      DATABASE_URL: postgres://traccia:traccia@postgres:5432/traccia?sslmode=disable
      ADMIN_TOKEN: ${ADMIN_TOKEN:?set ADMIN_TOKEN in .env}
      SESSION_SECRET: ${SESSION_SECRET:-}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-120}
      PLUGINS_DIR: /app/plugins
    volumes:
      - ./plugins:/app/plugins
    ports:
      - "8080:8080"

volumes:
  traccia_pgdata:
