name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: go build
        run: go build ./...

      - name: go vet
        run: go vet ./...

      - name: gofmt
        run: |
          fmt_out="$(gofmt -l .)"
          if [ -n "$fmt_out" ]; then
            echo "$fmt_out"
            echo "the files above are not gofmt'd — run 'gofmt -w .'"
            exit 1
          fi

      - name: go test
        run: go test ./...

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: traccia
          POSTGRES_PASSWORD: traccia
          POSTGRES_DB: traccia_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U traccia"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: go test -tags=integration
        env:
          TRACCIA_TEST_DATABASE_URL: postgres://traccia:traccia@localhost:5432/traccia_test?sslmode=disable
        run: go test -tags=integration ./...
